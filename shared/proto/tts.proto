syntax = "proto3";

package voice.tts.v1;

option java_multiple_files = true;
option java_outer_classname = "TtsProto";

// Text-to-Speech service with streaming synthesis.
// Supports both unary and bidirectional streaming for pipeline parallelism.
service TextToSpeech {
  // Unary-to-stream: synthesize complete text, stream audio chunks back
  rpc Synthesize (SynthesisRequest) returns (stream AudioChunk);

  // Bidirectional streaming: receive text deltas, stream audio as ready
  // Used for pipeline parallelism (TTS starts before LLM finishes)
  rpc StreamingSynthesize (stream TextChunk) returns (stream AudioChunk);

  // List available voices for a language
  rpc ListVoices (ListVoicesRequest) returns (ListVoicesResponse);
}

// Full text synthesis request
message SynthesisRequest {
  string session_id = 1;
  string text = 2;                    // Complete text to synthesize
  string language = 3;                // ISO 639-1: "en", "hi", "ta"
  string voice_id = 4;               // Voice profile identifier
  SynthesisConfig config = 5;
}

// Synthesis configuration
message SynthesisConfig {
  float speed = 1;                    // Speech rate: 0.5 - 2.0 (default: 1.0)
  float pitch = 2;                    // Pitch adjustment: 0.5 - 2.0 (default: 1.0)
  string audio_format = 3;           // "pcm16" | "opus" (default: "pcm16")
  int32 sample_rate = 4;             // Output sample rate (default: 24000)
}

// Incremental text chunk for streaming synthesis
message TextChunk {
  string session_id = 1;
  string text_delta = 2;             // Incremental text fragment
  bool is_final = 3;                 // true = no more text coming
  string language = 4;               // Language for this chunk
}

// Synthesized audio chunk
message AudioChunk {
  bytes audio_data = 1;              // Raw audio bytes (PCM16 or Opus)
  string session_id = 2;
  int64 timestamp_ms = 3;            // Position in synthesized audio
  bool is_final = 4;                 // true = last chunk
  AudioMetadata metadata = 5;
}

// Metadata about the synthesized audio
message AudioMetadata {
  int32 sample_rate = 1;
  int32 channels = 2;
  string encoding = 3;
  int32 duration_ms = 4;             // Duration of this chunk
  string text_segment = 5;           // Text that produced this audio chunk
}

// Request to list available voices
message ListVoicesRequest {
  string language = 1;               // Filter by language (empty = all)
}

// Available voices response
message ListVoicesResponse {
  repeated VoiceInfo voices = 1;
}

// Voice profile information
message VoiceInfo {
  string voice_id = 1;
  string name = 2;
  string language = 3;
  string gender = 4;                 // "male" | "female" | "neutral"
  string description = 5;
  bool is_default = 6;
}
