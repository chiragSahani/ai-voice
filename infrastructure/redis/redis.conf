# Redis 7.2 Configuration for Voice Agent Platform
# Optimized for session management + event streaming

# --- Network ---
bind 0.0.0.0
port 6379
protected-mode yes
requirepass ${REDIS_PASSWORD:-voiceagent_redis_dev}
tcp-backlog 511
tcp-keepalive 300
timeout 0

# --- General ---
daemonize no
loglevel notice
logfile ""
databases 4

# DB 0: Sessions (session:*, context:*)
# DB 1: Events (Redis Streams)
# DB 2: Rate limiting
# DB 3: Cache

# --- Snapshotting (RDB) ---
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# --- Append Only File (AOF) ---
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# --- Memory Management ---
maxmemory 512mb
maxmemory-policy allkeys-lru

# --- Streams ---
# Max stream length for event streams (trimmed approximately)
# Configured per-stream via XADD MAXLEN ~
stream-node-max-bytes 4096
stream-node-max-entries 100

# --- Slow Log ---
slowlog-log-slower-than 10000
slowlog-max-len 128

# --- Clients ---
maxclients 1000

# --- Security ---
# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""
# rename-command CONFIG ""

# --- Notifications ---
notify-keyspace-events "Ex"
# E = keyevent events
# x = expired events (for session TTL notifications)
